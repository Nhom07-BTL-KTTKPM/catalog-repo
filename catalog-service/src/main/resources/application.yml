spring:
  config:
    import: optional:file:.env[.properties]
  data:
    web:
      pageable:
        page-serialization-mode: via_dto
  application:
    name: catalog-service
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE}
  instance:
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS}
    ip-address: ${EUREKA_INSTANCE_IP_ADDRESS}
    hostname: ${EUREKA_INSTANCE_HOSTNAME}

auth:
  jwt:
    issuer: ${AUTH_JWT_ISSUER}
    secret: ${AUTH_JWT_SECRET}

internal:
  api:
    header-name: ${CATALOG_INTERNAL_API_HEADER_NAME:X-Internal-Api-Key}
    key: ${CATALOG_INTERNAL_API_KEY}

embedding:
  enabled: ${EMBEDDING_ENABLED:true}
  vector-dimension: ${EMBEDDING_VECTOR_DIMENSION:768}
  min-score: ${EMBEDDING_MIN_SCORE:0.35}
  ollama:
    base-url: ${EMBEDDING_OLLAMA_BASE_URL:http://localhost:11434}
    model: ${EMBEDDING_OLLAMA_MODEL:nomic-embed-text}
    timeout: ${EMBEDDING_OLLAMA_TIMEOUT:20s}
  reindex:
    enabled: ${EMBEDDING_REINDEX_ENABLED:true}
    cron: ${EMBEDDING_REINDEX_CRON:0 0 * * * *}
    batch-size: ${EMBEDDING_REINDEX_BATCH_SIZE:200}
    lock:
      enabled: ${EMBEDDING_REINDEX_LOCK_ENABLED:true}
      key: ${EMBEDDING_REINDEX_LOCK_KEY:731925}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
